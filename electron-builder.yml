appId: com.adf.app
productName: ADF Studio
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - resources/**/*
asarUnpack:
  - "node_modules/sqlite-vec*/**"
fileAssociations:
  - ext: adf
    name: Agent Document File
    role: Editor
    icon: resources/icons/mac/icon.icns
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.productivity
  icon: resources/icons/mac/icon.icns
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icons/win/icon.ico
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: resources/icons/png/512x512.png
