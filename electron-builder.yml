appId: com.adf.app
productName: ADF Studio
# Where `npm run release` (electron-builder --publish always) uploads installers.
# releaseType: draft = artifacts upload to a *draft* GitHub Release for the
# matching vX.Y.Z tag; you review it on GitHub, then click "Publish release".
# Switch to `release` once a CI workflow owns publishing (see RELEASING.md, #3).
publish:
  provider: github
  owner: christianbalevski
  repo: adf
  releaseType: draft
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - resources/**/*
asarUnpack:
  - "node_modules/sqlite-vec*/**"
mac:
  # No `arch:` override on purpose. electron-builder defaults to the host
  # arch, so the macos-14 runner produces the arm64 dmg and the macos-13
  # runner the x64 dmg — each with native modules (better-sqlite3 /
  # sqlite-vec) compiled for that arch. Forcing [arm64, x64] on one runner
  # would ship a broken cross-arch dmg. See .github/workflows/release.yml.
  target:
    - dmg
  category: public.app-category.productivity
  icon: resources/icons/mac/icon.icns
  fileAssociations:
    - ext: adf
      name: Agent Document Format
      role: Editor
      icon: resources/icons/mac/icon.icns
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icons/win/icon.ico
nsis:
  # Adds/removes the inbound firewall rules LAN discovery needs, elevated at
  # install time so the common case never hits a runtime UAC prompt.
  # Kept under resources/ (tracked) because build/ is gitignored.
  include: resources/firewall-installer.nsh
  fileAssociations:
    - ext: adf
      name: Agent Document Format
      role: Editor
      icon: resources/icons/win/icon.ico
linux:
  # .deb is the friction-free path: double-click installs via Software
  # Center / `sudo apt install ./file.deb`, registers a menu entry + the
  # .adf file association, no chmod/FUSE dance. AppImage kept for distros
  # without apt (needs `chmod +x` and libfuse2 — documented in RELEASING.md).
  target:
    - target: deb
      arch: [x64]
    - target: AppImage
      arch: [x64]
  maintainer: Christian Balevski <christian.balevski@gmail.com>
  category: Development
  icon: resources/icons/png/512x512.png
