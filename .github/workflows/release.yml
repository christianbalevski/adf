name: Release

# Fires when a version tag is pushed. `npm version <patch|minor|major>` makes
# the tag and the `postversion` hook pushes it (see RELEASING.md), so a normal
# release needs no manual CI step.
on:
  push:
    tags:
      - 'v*'

# GITHUB_TOKEN needs write access to create the release and upload installers.
permissions:
  contents: write

# Don't cancel a release that's mid-upload if the tag is re-pushed.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # One runner per OS *and per Mac arch* — you cannot cross-build a macOS
    # .dmg on Linux, a Windows .exe on macOS, or a working x64 .dmg on an
    # arm64 Mac (the native deps better-sqlite3 / sqlite-vec compile for the
    # host arch only, so a cross-arch dmg ships arm64 binaries that crash on
    # Intel). Each runner builds + uploads only its own host-arch installer.
    #   macos-14 = Apple Silicon (arm64),  macos-13 = Intel (x64).
    # NOTE: macos-13 is GitHub's last Intel-hosted image and is on a
    # deprecation path. If/when it's retired, Intel support needs either a
    # self-hosted Intel runner or a universal build with cross-arch prebuilds.
    # fail-fast: false so one platform failing doesn't abort the others.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-13, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # `npm ci` runs the postinstall hook, which electron-rebuilds
      # better-sqlite3 against Electron's ABI for this runner's OS + arch.
      - name: Install dependencies
        run: npm ci

      # = electron-vite build && electron-builder --publish always.
      # No arch is forced (see electron-builder.yml), so electron-builder
      # builds for this runner's host arch only. releaseType: draft means all
      # runners upload into the same *draft* GitHub Release for the tag —
      # nothing is public until the publish job flips it.
      - name: Build and publish installers
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple signing certs configured yet — don't let electron-builder
          # try to sign with a random keychain identity and fail.
          CSC_IDENTITY_AUTO_DISCOVERY: false

  publish:
    # Flip the draft to a published release only after every OS built and
    # uploaded successfully, so users never see a release missing a platform.
    # If any build job fails, this is skipped and the draft stays unpublished.
    needs: build
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 → full history + all tags, needed to diff this tag
      # against the previous version tag for the changelog.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes from commits
        run: node scripts/release-notes.mjs "${{ github.ref_name }}" > release-notes.md

      - name: Set notes and publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release edit "${{ github.ref_name }}"
          --repo "${{ github.repository }}"
          --notes-file release-notes.md
          --draft=false
