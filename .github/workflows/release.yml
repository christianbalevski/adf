name: Release

# Fires when a version tag is pushed. `npm version <patch|minor|major>` makes
# the tag and the `postversion` hook pushes it (see RELEASING.md), so a normal
# release needs no manual CI step.
on:
  push:
    tags:
      - 'v*'

# GITHUB_TOKEN needs write access to create the release and upload installers.
permissions:
  contents: write

# Don't cancel a release that's mid-upload if the tag is re-pushed.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Critical platforms — the release BLOCKS on these. One runner per OS: you
  # can't cross-build a macOS .dmg on Linux or a Windows .exe on macOS.
  # macos-14 (Apple Silicon) builds TWO dmgs: the arm64-only dmg (smaller,
  # for Apple Silicon users) plus a universal dmg that covers Intel Macs —
  # electron-builder packs the app once per arch, rebuilding better-sqlite3
  # for each (the Xcode toolchain cross-compiles x64 on arm64 fine), and
  # lipo-merges the two via @electron/universal. The universal dmg replaced
  # the macos-13 Intel job, which sat queued / never got a runner on every
  # release.
  # fail-fast: false so one platform failing doesn't abort the others.
  #
  # windows-2022 is PINNED, not windows-latest: GitHub migrated windows-latest
  # to windows-2025 (ships Visual Studio 2026), which our node-gyp (11.5.0) can't
  # detect — "Could not find any Visual Studio installation" — so the node-pty
  # native rebuild fails. windows-2022 has VS 2022, which node-gyp finds. Revisit
  # once node-gyp gains VS 2026 support.
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2022, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # `npm ci` runs the postinstall hook, which electron-rebuilds
      # better-sqlite3 against Electron's ABI for this runner's OS + arch.
      - name: Install dependencies
        run: npm ci

      # npm only installs the platform binary packages matching the host arch
      # (darwin-arm64), but the universal dmg must also carry the Intel
      # variants of sqlite-vec / esbuild / @lydell/node-pty — each resolves
      # its binary at runtime via process.arch. The script force-installs
      # them pinned to the exact versions the parent packages declare.
      - name: Add Intel binary packages for the universal build
        if: runner.os == 'macOS'
        run: node scripts/install-mac-x64-deps.mjs

      # = electron-vite build && electron-builder --publish always.
      # electron-builder.yml forces no arch, so Windows/Linux build for the
      # runner's host arch; on macOS the extra flags make both the arm64 and
      # universal dmgs described above. releaseType: draft means all runners
      # upload into the same *draft* GitHub Release for the tag — nothing is
      # public until the publish job flips it.
      - name: Build and publish installers
        run: npm run release ${{ runner.os == 'macOS' && '-- --arm64 --universal' || '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple signing certs configured yet — don't let electron-builder
          # try to sign with a random keychain identity and fail.
          CSC_IDENTITY_AUTO_DISCOVERY: false

  publish:
    # Publishes as soon as the CRITICAL platforms (build matrix: universal
    # mac, Windows, Linux) all succeed. If one fails, this is skipped
    # and the draft stays unpublished so users never see a release missing a
    # core platform.
    needs: build
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 → full history + all tags, needed to diff this tag
      # against the previous version tag for the changelog.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes from commits
        run: node scripts/release-notes.mjs "${{ github.ref_name }}" > release-notes.md

      - name: Set notes and publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release edit "${{ github.ref_name }}"
          --repo "${{ github.repository }}"
          --notes-file release-notes.md
          --draft=false
