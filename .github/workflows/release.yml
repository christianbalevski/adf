name: Release

# Fires when a version tag is pushed. `npm version <patch|minor|major>` makes
# the tag and the `postversion` hook pushes it (see RELEASING.md), so a normal
# release needs no manual CI step.
on:
  push:
    tags:
      - 'v*'

# GITHUB_TOKEN needs write access to create the release and upload installers.
permissions:
  contents: write

# Don't cancel a release that's mid-upload if the tag is re-pushed.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Critical platforms — the release BLOCKS on these. One runner per OS/arch:
  # you can't cross-build a macOS .dmg on Linux, a Windows .exe on macOS, or a
  # working x64 .dmg on an arm64 Mac (better-sqlite3 / sqlite-vec compile for
  # the host arch only). macos-14 = Apple Silicon (arm64).
  # fail-fast: false so one platform failing doesn't abort the others.
  #
  # windows-2022 is PINNED, not windows-latest: GitHub migrated windows-latest
  # to windows-2025 (ships Visual Studio 2026), which our node-gyp (11.5.0) can't
  # detect — "Could not find any Visual Studio installation" — so the node-pty
  # native rebuild fails. windows-2022 has VS 2022, which node-gyp finds. Revisit
  # once node-gyp gains VS 2026 support.
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2022, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # `npm ci` runs the postinstall hook, which electron-rebuilds
      # better-sqlite3 against Electron's ABI for this runner's OS + arch.
      - name: Install dependencies
        run: npm ci

      # = electron-vite build && electron-builder --publish always.
      # No arch is forced (see electron-builder.yml), so electron-builder
      # builds for this runner's host arch only. releaseType: draft means all
      # runners upload into the same *draft* GitHub Release for the tag —
      # nothing is public until the publish job flips it.
      - name: Build and publish installers
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple signing certs configured yet — don't let electron-builder
          # try to sign with a random keychain identity and fail.
          CSC_IDENTITY_AUTO_DISCOVERY: false

  # Intel macOS (x64) — BEST EFFORT, must never block a release. GitHub's
  # macos-13 is its last Intel image and is scarce/deprecating: the job can
  # sit queued for ~30+ min or never get a runner. So it is NOT in publish's
  # `needs`, and continue-on-error keeps a failed/timed-out Intel build from
  # marking the whole run red. If it does build, electron-builder uploads the
  # x64 dmg to the same release (draft, or already-published — it attaches by
  # tag either way, so a slightly-late Intel asset is fine).
  build-intel:
    runs-on: macos-13
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish installers
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  publish:
    # Publishes as soon as the CRITICAL platforms (build matrix: arm64 mac,
    # Windows, Linux) all succeed — it does NOT wait on build-intel. If a
    # critical platform fails, this is skipped and the draft stays unpublished
    # so users never see a release missing a core platform. The Intel dmg, if
    # build-intel ever finishes, attaches to the release whenever it does.
    needs: build
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 → full history + all tags, needed to diff this tag
      # against the previous version tag for the changelog.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes from commits
        run: node scripts/release-notes.mjs "${{ github.ref_name }}" > release-notes.md

      - name: Set notes and publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release edit "${{ github.ref_name }}"
          --repo "${{ github.repository }}"
          --notes-file release-notes.md
          --draft=false
